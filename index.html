<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Port Services</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #3b82f6;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg));
            color: var(--text); margin: 0; padding: 0; overflow: hidden;
        }
        .container { padding: 20px 16px 100px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 120px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .status-badge {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 6px 12px; border-radius: 20px; font-size: 13px; display: inline-block;
        }
        
        .card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 24px; margin-bottom: 20px; text-align: center;
        }
        
        .btn-pay {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; padding: 18px; border-radius: 18px;
            width: 100%; font-weight: 700; font-size: 17px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); margin-bottom: 15px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05); color: var(--text);
            border: 1px solid rgba(255,255,255,0.1); padding: 14px;
            border-radius: 16px; width: 100%; font-weight: 600;
        }

        .nav {
            position: fixed; bottom: 20px; left: 16px; right: 16px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border-radius: 30px; display: flex; padding: 6px; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { flex: 1; text-align: center; padding: 12px; color: #64748b; text-decoration: none; font-size: 12px; }
        .nav-item.active { color: white; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        #qr { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 15px 0; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://files.catbox.moe/9o4k5q.png" alt="Port Logo">
        <h3>Узлы доступа: <span style="color:var(--accent)">AMS-01</span></h3>
    </div>

    <div id="home" class="tab-content active">
        <div class="card">
            <div class="status-badge">● Система активна</div>
            <h2 style="margin: 15px 0 5px;">Port Services</h2>
            <p style="color:#94a3b8; font-size: 14px; margin-bottom: 25px;">Зашифрованный туннель для работы с удаленным оборудованием</p>
            
            <button class="btn-pay" onclick="handlePayment()">
                <i class="fas fa-wallet" style="margin-right: 8px;"></i> Оплата через СБП
            </button>
            
            <button class="btn-secondary" onclick="getAccess()">
                <i class="fas fa-key" style="margin-right: 8px;"></i> Получить токен доступа
            </button>
            
            <div class="loader" id="loader"></div>
            <div id="access-block" style="display:none; margin-top: 20px;">
                <div id="qr"></div>
                <button class="btn-secondary" onclick="syncApp()">⚡ Синхронизировать шлюз</button>
            </div>
        </div>
    </div>

    <div id="profile" class="tab-content" style="display:none;">
        <div class="card">
            <h3 style="margin-top:0;">Управление лицензией</h3>
            <div style="text-align:left; font-size: 15px;">
                <p><strong>Пользователь:</strong> <span id="user-name">---</span></p>
                <p><strong>Лицензия:</strong> <span>Стандартная (30 дн.)</span></p>
                <p><strong>Осталось:</strong> <span style="color:var(--accent)">30 дней</span></p>
            </div>
        </div>
    </div>
</div>

<nav class="nav">
    <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-server"></i>Серверы</a>
    <a href="javascript:void(0)" class="nav-item" onclick="switchTab('profile', this)"><i class="fas fa-user-shield"></i>Лицензия</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://77.221.154.23:3000"; // Тут потом будет твой HTTPS домен
    let lastToken = "";

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    // ЛОГИКА ОПЛАТЫ
    async function handlePayment() {
        tg.HapticFeedback.impactOccurred('medium');
        // Здесь мы будем вызывать твой сервер для получения ссылки на СБП
        tg.showAlert("Переадресация на шлюз СБП...");
        // Пример: tg.openLink('https://payform.ru/link-to-your-tinkoff-payment');
    }

    // ЛОГИКА ДОСТУПА
    async function getAccess() {
        const loader = document.getElementById('loader');
        const block = document.getElementById('access-block');
        loader.style.display = 'block';
        
        try {
            const user = tg.initDataUnsafe?.user || { id: 0 };
            const res = await fetch(`${API_URL}/api/get-key`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: user.id })
            });
            const data = await res.json();
            if(data.key) {
                lastToken = data.key;
                document.getElementById('qr').innerHTML = "";
                new QRCode(document.getElementById('qr'), { text: data.key, width: 160, height: 160 });
                block.style.display = 'block';
                tg.HapticFeedback.notificationOccurred('success');
            }
        } catch(e) {
            tg.showAlert("Ошибка узла доступа. Попробуйте позже.");
        }
        loader.style.display = 'none';
    }

    function syncApp() {
        if(!lastToken) return;
        tg.setClipboardText(lastToken);
        tg.openLink(`v2raytun://import/${lastToken}`);
        tg.showConfirm("Данные синхронизированы! Если шлюз не открылся, вставьте токен из буфера обмена вручную.");
    }

    document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Guest";
</script>
</body>
</html>
