<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Прокси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --secondary: #8e8e93;
            --accent: #007aff;
        }

        * { box-sizing: border-box; margin:0; padding:0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 420px; }

        .card {
            background: var(--card);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 28px 24px;
        }

        .header { text-align: center; margin-bottom: 24px; }
        .title { font-size: 28px; font-weight: 700; }
        .subtitle { font-size: 17px; color: var(--secondary); margin-top: 4px; }

        .status {
            text-align: center;
            color: #34c759;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .info {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 28px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #e5e5ea;
        }
        .row:last-child { border-bottom: none; }

        .label { font-size: 15px; color: var(--secondary); font-weight: 500; }
        .value { 
            font-size: 16px; 
            font-weight: 600; 
            font-family: monospace; 
            text-align: right; 
            word-break: break-all;
        }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 19px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
        }
        .btn-main:active { transform: scale(0.96); }

        .btn-secondary {
            width: 100%;
            background: transparent;
            border: 2px solid #c7c7cc;
            color: var(--accent);
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer {
            text-align: center;
            font-size: 13px;
            color: var(--secondary);
            margin-top: 32px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">

            <div class="header">
                <div class="title">Прокси</div>
                <div class="subtitle">MTProto для Telegram</div>
            </div>

            <div class="status">
                ● Онлайн • 89.22.234.223
            </div>

            <div class="info">
                <div class="row">
                    <span class="label">Сервер</span>
                    <span class="value">89.22.234.223</span>
                </div>
                <div class="row">
                    <span class="label">Порт</span>
                    <span class="value">8888</span>
                </div>
                <div class="row">
                    <span class="label">Секрет</span>
                    <span id="secret-text" class="value">a1b2c3d4e5f67890123456789abcdef0</span>
                </div>
            </div>

            <button onclick="connectProxy()" class="btn-main">
                <i class="fas fa-plug"></i>
                Подключить прокси
            </button>

            <button onclick="copyLink()" class="btn-secondary">
                <i class="fas fa-link"></i>
                Скопировать ссылку
            </button>

            <div class="footer">
                Нажми кнопку — Telegram предложит включить прокси
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const SERVER = "89.22.234.223";
        const PORT = "8888";
        const SECRET = "a1b2c3d4e5f67890123456789abcdef0";

        const PROXY_URL = `https://t.me/proxy?server=\( {SERVER}&port= \){PORT}&secret=${SECRET}`;

        function connectProxy() {
            tg.showAlert("Открываем подключение…");   // ← для отладки
            tg.openTelegramLink(PROXY_URL);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function copyLink() {
            tg.setClipboardText(PROXY_URL);
            tg.showAlert("✅ Ссылка скопирована в буфер обмена");
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
