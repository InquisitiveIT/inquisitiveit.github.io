<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VPN TATAR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --tg-bg-color: #f2f2f7;
            --tg-text-color: #000000;
            --tg-hint-color: #8e8e93;
            --tg-button-color: #007aff;
            --tg-button-text-color: #ffffff;
            --tg-secondary-bg: #ffffff;
            --tg-accent: #007aff;

            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.18);
            --blur: blur(20px);
        }

        [data-theme="dark"] {
            --tg-bg-color: #000000;
            --tg-text-color: #ffffff;
            --tg-hint-color: #8e8e93;
            --tg-secondary-bg: #1c1c1e;
            --glass-bg: rgba(28, 28, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-bg-color);
            color: var(--tg-text-color);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .page-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            padding-top: env(safe-area-inset-top);
            -webkit-overflow-scrolling: touch;
        }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .tariff-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .tariff-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            backdrop-filter: var(--blur);
        }

        .tariff-card .price {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
            color: var(--tg-accent);
        }

        .tariff-card .old-price {
            text-decoration: line-through;
            color: var(--tg-hint-color);
            font-size: 16px;
            margin-left: 8px;
        }

        .nav-bar {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 16px);
            left: 16px;
            right: 16px;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 6px;
            box-sizing: border-box;
        }

        .nav-wrapper {
            position: relative;
            display: flex;
            height: 100%;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-color);
            font-size: 11px;
            font-weight: 500;
            transition: color 0.35s ease;
            z-index: 2;
            gap: 2px;
        }

        .nav-item i { font-size: 22px; }

        .nav-item.active { color: var(--tg-button-text-color); }

        .slider {
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: 25%;
            background: var(--tg-button-color);
            border-radius: 16px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
            box-shadow: 0 2px 12px rgba(0, 122, 255, 0.4);
        }

        .btn-main, .btn-auto {
            background: var(--tg-button-color);
            color: var(--tg-button-text-color);
            border: none;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            font-weight: 600;
            font-size: 17px;
            margin: 8px 0;
            transition: transform 0.12s;
        }

        .btn-main:active, .btn-auto:active { transform: scale(0.97); }

        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--tg-accent);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { font-size: 28px; font-weight: 700; margin: 8px 0 20px; letter-spacing: -0.5px; }

        #qr { margin: 20px auto; text-align: center; }
    </style>
</head>
<body>

    <div class="page-container">
        <div id="home" class="tab-content active">
            <h2>Главная</h2>
            <div class="glass-card" style="text-align:center;">
                <div id="sub-status" style="font-size:15px; margin-bottom:12px;">● Подписка не активна</div>
                <button id="connect-btn" class="btn-main">
                    <i class="fas fa-bolt"></i> Подключить v2RayTun
                </button>
                <div class="loader" id="main-loader"></div>
                <div id="qr"></div>
                <button id="auto-connect-btn" class="btn-auto" style="display:none;">
                    <i class="fas fa-link"></i> Автоподключение v2RayTun
                </button>
            </div>
        </div>

        <div id="sub" class="tab-content">
            <h2>Подписка</h2>
            <div class="tariff-grid">
                <div class="tariff-card glass-card">
                    <h3>1 месяц</h3>
                    <div class="price">100 ₽</div>
                    <button class="btn-main" onclick="pay(100, '1m')">Купить</button>
                </div>

                <div class="tariff-card glass-card">
                    <h3>3 месяца</h3>
                    <div class="price">250 ₽</div>
                    <button class="btn-main" onclick="pay(250, '3m')">Купить</button>
                </div>

                <div class="tariff-card glass-card">
                    <h3>1 год</h3>
                    <div class="price">756 ₽ <span class="old-price">900 ₽</span></div>
                    <div style="font-size:13px; color:var(--tg-hint-color); margin-bottom:8px;">-30% скидка</div>
                    <button class="btn-main" onclick="pay(756, '12m')">Купить</button>
                </div>
            </div>
        </div>

        <div id="devices" class="tab-content">
            <h2>Устройства</h2>
            <div class="glass-card">
                <b>iOS / Android</b>
                <p style="color:var(--tg-hint-color); font-size:15px; margin:12px 0;">
                    Скачайте v2RayTun и импортируйте конфиг.
                </p>
                <button class="btn-main" onclick="tg.openLink('https://apps.apple.com/app/v2raytun/id6476628951')">
                    Скачать для iOS
                </button>
                <button class="btn-main" onclick="tg.openLink('https://play.google.com/store/apps/details?id=com.v2raytun.android')">
                    Скачать для Android
                </button>
            </div>
        </div>

        <div id="profile" class="tab-content">
            <h2>Профиль</h2>
            <div class="glass-card">
                <div id="username" style="font-weight:600; font-size:19px;">Пользователь</div>
                <div id="userid" style="color:var(--tg-hint-color); font-size:13px; margin-top:4px;">ID: ---</div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-wrapper">
            <a href="javascript:void(0)" class="nav-item active" data-tab="home" onclick="showTab('home', this)">
                <i class="fas fa-home"></i><span>Главная</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-tab="sub" onclick="showTab('sub', this)">
                <i class="fas fa-crown"></i><span>Подписка</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-tab="devices" onclick="showTab('devices', this)">
                <i class="fas fa-desktop"></i><span>Устройства</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-tab="profile" onclick="showTab('profile', this)">
                <i class="fas fa-user-circle"></i><span>Профиль</span>
            </a>
            <div class="slider"></div>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let subscriptionActive = false;
        let user = null;
        let currentConfig = null; // сохраним конфиг для автоподключения

        function applyTheme() {
            const params = tg.themeParams;
            const scheme = tg.colorScheme;
            document.documentElement.setAttribute('data-theme', scheme);

            ['bg_color','text_color','hint_color','button_color','button_text_color','link_color']
                .forEach(key => {
                    if (params[key]) document.documentElement.style.setProperty(`--tg-${key.replace(/_/g,'-')}`, params[key]);
                });

            document.getElementById('sub-status').style.color = subscriptionActive 
                ? (params.link_color || '#34c759') : (params.destructive_text_color || '#ff3b30');
        }

        tg.onEvent('themeChanged', applyTheme);
        applyTheme();

        async function validateUser() {
            const initData = tg.initData;
            if (!initData) return tg.showAlert("Не удалось получить данные");

            try {
                const res = await fetch("https://твой-домен/api/auth", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ initData })
                });
                const data = await res.json();
                if (data.ok && data.user) {
                    user = data.user;
                    localStorage.setItem("user", JSON.stringify(user));
                    document.getElementById('username').innerText = user.first_name || "Пользователь";
                    document.getElementById('userid').innerText = "ID: " + user.id;
                    await checkSubscription();
                } else {
                    tg.showAlert("Ошибка авторизации");
                }
            } catch {
                tg.showAlert("Ошибка соединения");
            }
        }

        async function checkSubscription() {
            if (!user?.id) return;
            document.getElementById('main-loader').style.display = 'block';

            try {
                const res = await fetch(`https://твой-домен/api/subscription?userId=${user.id}`);
                const data = await res.json();
                subscriptionActive = data.active;

                document.getElementById('sub-status').innerHTML = subscriptionActive 
                    ? `● Активна до ${data.expires}` : `● Подписка не активна`;
                applyTheme();
            } catch {
                tg.showAlert("Ошибка проверки подписки");
            } finally {
                document.getElementById('main-loader').style.display = 'none';
            }
        }

        async function getVpnConfig() {
            document.getElementById('main-loader').style.display = 'block';
            document.getElementById('auto-connect-btn').style.display = 'none';

            try {
                const res = await fetch(`https://твой-домен/api/get-config?userId=${user.id}`);
                const data = await res.json();

                if (data.config) {
                    currentConfig = data.config;

                    document.getElementById('qr').innerHTML = '';
                    new QRCode(document.getElementById('qr'), {
                        text: currentConfig,
                        width: 220,
                        height: 220,
                        colorDark: tg.themeParams.text_color || "#ffffff",
                        colorLight: tg.themeParams.bg_color || "#000000"
                    });

                    tg.showPopup({
                        title: "Конфиг готов",
                        message: "Отсканируйте QR или используйте автоподключение",
                        buttons: [
                            {type: "ok"},
                            {type: "default", text: "Скопировать", id: "copy"}
                        ]
                    }, (btnId) => {
                        if (btnId === "copy") {
                            tg.setClipboardText(currentConfig);
                            tg.showAlert("Скопировано");
                        }
                    });

                    // Показываем кнопку автоподключения
                    document.getElementById('auto-connect-btn').style.display = 'block';
                } else {
                    tg.showAlert("Не удалось получить конфиг");
                }
            } catch {
                tg.showAlert("Ошибка сервера");
            } finally {
                document.getElementById('main-loader').style.display = 'none';
            }
        }

        function autoConnect() {
            if (!currentConfig) return tg.showAlert("Конфиг не загружен");

            const encoded = encodeURIComponent(currentConfig);
            const deepLink = `v2raytun://import?config=${encoded}`;

            tg.openLink(deepLink);

            // Запасной вариант через 1.5 секунды
            setTimeout(() => {
                tg.showAlert("Если v2RayTun не открылся:\n1. Скопируйте конфиг ниже\n2. Вставьте в приложение вручную");
                tg.setClipboardText(currentConfig);
            }, 1500);
        }

        function connectVpn() {
            if (subscriptionActive) {
                getVpnConfig();
            } else {
                tg.showAlert("Сначала оформите подписку");
                showTab('sub', document.querySelector('[data-tab="sub"]'));
            }
        }

        function pay(amount, period) {
            tg.showConfirm(`Оплатить \( {amount} ₽ ( \){period})?`, async (ok) => {
                if (ok) {
                    if (!user?.id) return tg.showAlert("Авторизуйтесь");
                    try {
                        const res = await fetch('https://твой-домен/api/create-1plat-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: user.id, amount, period })
                        });
                        const data = await res.json();
                        if (data.paymentUrl) {
                            tg.openLink(data.paymentUrl);
                        } else {
                            tg.showAlert('Ошибка создания платежа');
                        }
                    } catch {
                        tg.showAlert("Ошибка соединения");
                    }
                }
            });
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            const index = Array.from(document.querySelectorAll('.nav-item')).indexOf(el);
            document.querySelector('.slider').style.transform = `translateX(${index * 100}%)`;

            tg.HapticFeedback.impactOccurred('light');
        }

        // Инициализация
        validateUser();

        // Начальное положение ползунка
        window.addEventListener('load', () => {
            const active = document.querySelector('.nav-item.active');
            if (active) {
                const index = Array.from(document.querySelectorAll('.nav-item')).indexOf(active);
                document.querySelector('.slider').style.transform = `translateX(${index * 100}%)`;
            }
        });

        // Привязываем автоподключение
        document.getElementById('auto-connect-btn').addEventListener('click', autoConnect);
    </script>
</body>
</html>
