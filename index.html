<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN TATAR Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --accent-blue: #007aff;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-color);
            /* Мягкое свечение на фоне */
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e, #000);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            -webkit-user-select: none;
        }

        /* Контейнер для вкладок */
        .content {
            display: none;
            padding: 20px;
            padding-bottom: 140px;
            height: 100vh;
            overflow-y: auto;
            box-sizing: border-box;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* КАРТОЧКА LIQUID GLASS */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Кнопка в стиле iOS */
        .ios-btn {
            background: var(--accent-blue);
            color: #fff; border: none;
            padding: 18px; border-radius: 18px;
            width: 100%; font-weight: 600; font-size: 17px;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .ios-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Вторичная кнопка (стеклянная) */
        .ios-btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #fff; border: 0.5px solid var(--glass-border);
            padding: 14px; border-radius: 16px; width: 100%;
            margin-top: 10px; font-weight: 500;
        }

        /* Плывущее меню (Tab Bar) */
        .nav-bar {
            position: fixed;
            bottom: 30px; left: 20px; right: 20px;
            height: 74px;
            background: rgba(30, 30, 32, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            border: 0.5px solid var(--glass-border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .nav-item {
            color: var(--text-dim); text-align: center; text-decoration: none;
            flex: 1; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--accent-blue); transform: translateY(-2px); }
        .nav-item i { font-size: 24px; }
        .nav-item span { font-size: 11px; font-weight: 600; }

        h2 { font-size: 32px; font-weight: 800; margin: 10px 0 25px 0; letter-spacing: -0.5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff453a; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #ff453a; }
    </style>
</head>
<body>

    <div id="home" class="content active">
        <h2>Главная</h2>
        <div class="glass-card">
            <div style="margin-bottom: 20px;">
                <span class="status-dot"></span>
                <span style="color: var(--text-dim); font-weight: 500;">Статус:</span> 
                <span style="color: #ff453a; font-weight: 600;">Не оплачено</span>
            </div>
            
            <button class="ios-btn" onclick="connectVpn()">
                <i class="fas fa-bolt"></i> Подключить v2RayTun
            </button>
            
            <button class="ios-btn-secondary" onclick="copyKey()">
                <i class="fas fa-copy"></i> Копировать ключ
            </button>
        </div>
    </div>

    <div id="sub" class="content">
        <h2>Подписка</h2>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h3 style="margin:0; font-size: 20px
