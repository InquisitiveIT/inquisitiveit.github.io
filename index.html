        body {

        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {

            padding: 20px;

        }

            font-size: 10px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }
