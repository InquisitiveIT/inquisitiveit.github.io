<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лендинг | Связь и материалы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem 1.5rem;
        }
        .landing-card {
            max-width: 620px; width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            padding: 2.5rem 2rem;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(120deg, #1A2A4F, #2C3E66);
            -webkit-background-clip: text; color: transparent;
            margin-bottom: 0.75rem;
        }
        .divider { width: 70px; height: 3px; background: linear-gradient(90deg, #2b7a4b, #34a7c1); margin: 1rem auto 0; border-radius: 3px; }
        
        .buttons-grid { display: flex; flex-direction: column; gap: 1.1rem; margin-top: 1rem; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 1rem;
            padding: 0.9rem 1.2rem; border-radius: 2rem;
            font-size: 1rem; font-weight: 600; text-decoration: none;
            transition: all 0.25s; border: none; cursor: pointer;
            background: #fff; color: #1f2937; width: 100%;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 18px 28px -12px rgba(0,0,0,0.2); }
        .btn i { font-size: 1.4rem; width: 1.8rem; text-align: center; }
        .btn span { flex: 1; text-align: left; }

        .btn-whatsapp { background: #25D366; color: white; }
        .btn-telegram { background: #26A5E4; color: white; }
        .btn-max { background: #4B6F8C; color: white; }
        .btn-price, .btn-catalog { background: #F0F4F9; color: #1E2F47; }
        .btn-callback { background: #FF8C42; color: white; border: none; }

        /* Состояние таймера */
        .timer-active { background: #e67e2e !important; cursor: wait; transform: none !important; }

        .footnote { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #6c757d; border-top: 1px solid #e2e8f0; padding-top: 1.2rem; }
        @media (max-width: 500px) { .landing-card { padding: 1.5rem 1.2rem; } .hero h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>

<div class="landing-card">
    <div class="hero">
        <h1>Будь на связи</h1>
        <p>Удобный формат общения и полезные материалы</p>
        <div class="divider"></div>
    </div>

    <div class="buttons-grid">
        <a href="https://wa.me/79060650654?text=Здравствуйте!%20Хочу%20консультацию" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>Написать в WhatsApp</span>
            <i class="fas fa-chevron-right" style="font-size: 0.8rem; opacity: 0.7;"></i>
        </a>

        <button id="telegramBtn" class="btn btn-telegram">
            <i class="fab fa-telegram"></i>
            <span>Связаться в Telegram</span>
            <i class="fas fa-chevron-right" style="font-size: 0.8rem; opacity: 0.7;"></i>
        </button>

        <button id="maxBtn" class="btn btn-max">
            <i class="fas fa-comment-dots"></i>
            <span>Мессенджер Max</span>
            <i class="fas fa-external-link-alt" style="font-size: 0.8rem; opacity: 0.7;"></i>
        </button>

        <button id="downloadPriceBtn" class="btn btn-price">
            <i class="fas fa-file-invoice-dollar"></i>
            <span>Скачать прайс-лист</span>
            <i class="fas fa-download" style="font-size: 0.8rem; opacity: 0.7;"></i>
        </button>

        <button id="callbackBtn" class="btn btn-callback">
            <i class="fas fa-phone-alt"></i>
            <span id="callbackText">Перезвонить за 30 секунд</span>
            <i class="fas fa-bolt" style="font-size: 0.8rem; opacity: 0.7;"></i>
        </button>
    </div>

    <div class="footnote">
        <i class="fas fa-shield-alt" style="margin-right: 6px;"></i> Нажмите для связи или получения документов
    </div>
</div>

<script type="text/javascript" src="https://perezvoni.com/view/widget/3596" charset="UTF-8"></script>

<script>
    const PHONE_NUMBER = '+79060650654';
    const FORMATTED_PHONE = '+7 906 065-06-54';

    // Telegram
    document.getElementById('telegramBtn').onclick = () => {
        navigator.clipboard.writeText(PHONE_NUMBER);
        if(confirm(`Номер ${FORMATTED_PHONE} скопирован. Открыть Telegram?`)) {
            window.open('https://t.me/+79060650654', '_blank');
        }
    };

    // Max Messenger
    document.getElementById('maxBtn').onclick = () => {
        navigator.clipboard.writeText(PHONE_NUMBER);
        alert(`Номер ${FORMATTED_PHONE} скопирован для Max.`);
        window.open('https://web.max.ru/', '_blank');
    };

    // Заглушка для прайса
    document.getElementById('downloadPriceBtn').onclick = () => {
        if(confirm("Файл обновляется. Перейти в WhatsApp для получения?")) {
            window.open(`https://wa.me/${PHONE_NUMBER.replace('+','')}`, '_blank');
        }
    };

    // --- ЛОГИКА PEREZVONI.COM ---

    const callbackBtn = document.getElementById('callbackBtn');
    const callbackText = document.getElementById('callbackText');

    // Клик по вашей кнопке вызывает виджет
    callbackBtn.onclick = (e) => {
        e.preventDefault();
        if (typeof perezvoni_open === 'function') {
            perezvoni_open(); // Официальная функция вызова окна
        } else {
            // Если скрипт еще не загрузился, ищем кнопку-трубку самого сервиса и кликаем по ней
            const defaultBtn = document.querySelector('.pz-fab, .perezvoni-button');
            if(defaultBtn) defaultBtn.click();
            else alert("Сервис звонков загружается, пожалуйста, подождите...");
        }
    };

    // Функция таймера
    function startTimer() {
        let seconds = 30;
        callbackBtn.classList.add('timer-active');
        callbackBtn.disabled = true;

        const interval = setInterval(() => {
            seconds--;
            if (seconds >= 0) {
                callbackText.innerText = `Соединяем... ${seconds} сек`;
            } else {
                clearInterval(interval);
                callbackBtn.classList.remove('timer-active');
                callbackBtn.disabled = false;
                callbackText.innerText = "Перезвонить за 30 секунд";
            }
        }, 1000);
    }

    // ПОДПИСКА НА СОБЫТИЕ СЕРВИСА
    // Когда пользователь ввел номер и нажал кнопку в виджете, perezvoni.com генерирует событие
    window.addEventListener('pz_callback_done', function(e) {
        startTimer();
    });

</script>
</body>
</html>
