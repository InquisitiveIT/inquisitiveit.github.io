<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN TATAR Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        .card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Тариф: 1 Месяц</h2>
        <p>Цена: 199 ₽</p>
        <button class="btn" onclick="startPay()">Купить доступ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function startPay() {
            tg.showConfirm("Перейти к оплате 199 ₽?", async (ok) => {
                if (ok) {
                    try {
                        // Запрос на твой сервер Aeza
                        const response = await fetch('http://77.221.154.23:3000/api/pay', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        const data = await response.json();
                        
                        if (data.ok && data.url) {
                            tg.openLink(data.url); // Открываем страницу 1PLAT
                        } else {
                            tg.showAlert("Ошибка: " + (data.error || "сервер не выдал ссылку"));
                        }
                    } catch (e) {
                        tg.showAlert("Нет связи с сервером. Убедитесь, что порт 3000 открыт.");
                    }
                }
            });
        }
    </script>
</body>
</html>
