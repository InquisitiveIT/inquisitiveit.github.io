<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VPN PORT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --card-bg: #161b26;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-hint: #94a3b8;
            --success: #10b981;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh;
            overflow: hidden; /* Чтобы не было лишнего скролла */
        }

        /* --- ГЛАВНАЯ СТРАНИЦА --- */
        #main-view {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .hero {
            width: 100%;
            height: 40vh;
            background: url('https://img.freepik.com/free-photo/cute-animal-wearing-hat_23-2150932220.jpg') center/cover;
            position: relative;
            flex-shrink: 0;
        }

        .hero-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, var(--bg-dark));
            pointer-events: none; /* ВАЖНО: чтобы не блокировало нажатия */
        }

        .menu-grid {
            padding: 0 16px 20px;
            margin-top: -30px;
            position: relative;
            z-index: 10; /* Поднимаем выше всех */
            overflow-y: auto;
            flex: 1;
        }

        .btn-tile {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-tile:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        .btn-tile.primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            justify-content: center;
            font-size: 18px;
            padding: 22px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .two-cols .btn-tile { margin-bottom: 0; flex-direction: column; text-align: center; padding: 20px 10px; }

        /* --- ПОД-СТРАНИЦЫ --- */
        .page {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px 16px;
            overflow-y: auto;
        }
        .page.active { display: flex; }

        .status-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .copy-field {
            background: #000;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .btn-action {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }

        h2 { margin-top: 0; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="hero"><div class="hero-fade"></div></div>
        <div class="menu-grid">
            <div class="btn-tile primary" onclick="nav('page-plans')">
                <i class="fas fa-key"></i> Купить подписку
            </div>
            <div class="two-cols">
                <div class="btn-tile" onclick="nav('page-setup')">
                    <i class="fas fa-shield-alt" style="color:var(--accent); font-size:22px; margin-bottom:8px;"></i>
                    Установить
                </div>
                <div class="btn-tile" onclick="nav('page-profile')">
                    <i class="fas fa-user" style="color:var(--accent); font-size:22px; margin-bottom:8px;"></i>
                    Кабинет
                </div>
            </div>
            <div class="btn-tile" onclick="tg.openTelegramLink('https://t.me/port_support')">
                <i class="fas fa-comment-dots" style="color:var(--accent)"></i> Поддержка
            </div>
            <div class="btn-tile" onclick="nav('page-ref')">
                <i class="fas fa-users" style="color:var(--accent)"></i> Партнерская программа
            </div>
        </div>
    </div>

    <div id="page-plans" class="page">
        <h2>Тарифы</h2>
        <div class="status-box">Выберите план оплаты</div>
        <button class="btn-action" onclick="tg.showAlert('Оплата скоро появится')">Оплатить</button>
    </div>

    <div id="page-profile" class="page">
        <h2>Личный кабинет</h2>
        <div class="status-box">
            <div style="color:var(--text-hint); margin-bottom:10px;">Статус подписки</div>
            <span style="color:var(--success); font-weight:700;">● Действует</span>
            <div style="margin-top:10px;">до 26.02.2026</div>
        </div>
        <div class="copy-field">
            <span style="font-size:12px; opacity:0.7">https://sub.port.net/...</span>
            <i class="fas fa-copy" style="color:var(--accent)" onclick="tg.showAlert('Ключ скопирован')"></i>
        </div>
    </div>

    <div id="page-setup" class="page">
        <h2>Настройка VPN</h2>
        <div class="status-box">Инструкция по установке в 3 шага</div>
        <button class="btn-action" onclick="closePages()">Понятно</button>
    </div>

    <div id="page-ref" class="page">
        <h2>Рефералы</h2>
        <div class="status-box">Приглашай друзей и получай дни</div>
        <button class="btn-action" onclick="tg.showAlert('Ссылка скопирована')">Копировать ссылку</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // 1. Сигнализируем Telegram, что мы готовы
        tg.ready();
        tg.expand();

        // 2. Универсальная навигация
        function nav(pageId) {
            console.log("Navigating to:", pageId); // Для отладки
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.add('active');
                tg.BackButton.show();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // 3. Закрытие всех страниц
        function closePages() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            tg.BackButton.hide();
        }

        // 4. Слушаем кнопку "Назад" в самом Telegram
        tg.onEvent('backButtonClicked', closePages);

        // Фикс для корректной высоты на мобильных
        function setHeight() {
            document.body.style.height = window.innerHeight + 'px';
        }
        window.addEventListener('resize', setHeight);
        setHeight();
    </script>
</body>
</html>
