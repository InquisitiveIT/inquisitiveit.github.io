<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VPN PORT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #05080f;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --tg-viewport-height: 100vh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0f1a;
            color: #fff;
            margin: 0; padding: 0;
            height: var(--tg-viewport-height);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Визуальный блок сверху */
        .hero-section {
            width: 100%;
            height: 40%; /* Занимает 40% экрана */
            position: relative;
            background: url('https://img.freepik.com/free-photo/cute-animal-wearing-hat_23-2150932220.jpg') center/cover; /* Сюда поставишь свою картинку */
            flex-shrink: 0;
        }

        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, #0a0f1a);
        }

        /* Контейнер меню */
        .menu-container {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* Кнопки меню */
        .menu-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            display: flex; align-items: center; gap: 15px;
            color: #fff; text-decoration: none;
            font-weight: 600; font-size: 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .menu-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }

        .menu-btn.primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            justify-content: center;
            font-size: 18px; padding: 22px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .icon-box {
            width: 24px; text-align: center;
            color: var(--accent); font-size: 18px;
        }
        .primary .icon-box { color: #fff; }

        /* Слой для контента (Планы, Рефералка и т.д.) */
        .sub-page {
            position: fixed; inset: 0;
            background: #0a0f1a;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px 16px;
        }
        .sub-page.active { display: flex; }

        .back-btn {
            margin-bottom: 20px; color: var(--accent);
            display: flex; align-items: center; gap: 8px; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="hero-overlay"></div>
    </div>

    <div class="menu-container" id="main-menu">
        <div class="menu-btn primary" onclick="showSubPage('plans')">
            <div class="icon-box"><i class="fas fa-key"></i></div>
            Купить подписку
        </div>

        <div class="menu-grid">
            <div class="menu-btn" onclick="showSubPage('setup')">
                <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
                Установить
            </div>
            <div class="menu-btn" onclick="showSubPage('profile')">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                Кабинет
            </div>
        </div>

        <div class="menu-btn" onclick="tg.openTelegramLink('https://t.me/port_support')">
            <div class="icon-box"><i class="fas fa-comment-dots"></i></div>
            Поддержка
        </div>

        <div class="menu-btn" onclick="showSubPage('referral')">
            <div class="icon-box"><i class="fas fa-users"></i></div>
            Партнерская программа
        </div>
    </div>

    <div id="page-referral" class="sub-page">
        <div class="back-btn" onclick="closeSubPage()">
            <i class="fas fa-arrow-left"></i> Назад
        </div>
        <h2>Реферальная программа</h2>
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showSubPage(id) {
            // В реальном коде мы будем открывать разные блоки
            tg.HapticFeedback.impactOccurred('medium');
            if (id === 'referral') {
                document.getElementById('page-referral').classList.add('active');
                tg.BackButton.show();
            } else {
                tg.showAlert("Этот раздел в разработке");
            }
        }

        function closeSubPage() {
            document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
            tg.BackButton.hide();
        }

        tg.onEvent('backButtonClicked', closeSubPage);

        // Обновление высоты
        function updateHeight() {
            document.documentElement.style.setProperty('--tg-viewport-height', tg.viewportHeight + 'px');
        }
        tg.onEvent('viewportChanged', updateHeight);
        updateHeight();
    </script>
</body>
</html>
