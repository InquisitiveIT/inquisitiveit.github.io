<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VPN PORT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-deep: #05080f;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-hint: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1a2333, #05080f);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; /* Убираем синие контуры */
            user-select: none;
        }

        .bg-glow {
            position: fixed;
            width: 300px; height: 300px;
            background: var(--accent);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.12;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(110%, 50%); }
        }

        .header {
            text-align: center;
            padding: 20px 0;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .header span { color: var(--accent); }

        .page-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 140px;
            position: relative;
        }

        .tab-content {
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: 0.3s ease;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .btn-main {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 18px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 16px;
            width: 100%;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .nav-bar {
            position: fixed;
            bottom: 25px; left: 16px; right: 16px;
            height: 70px;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            display: flex;
            padding: 0 10px;
            z-index: 1000;
            touch-action: none; /* Важно для Slide-to-Tab */
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-hint);
            font-size: 10px;
            text-decoration: none;
            z-index: 2;
            outline: none;
        }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active i { transform: scale(1.1); }

        .slider {
            position: absolute;
            top: 10px;
            width: calc(25% - 15px); height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            pointer-events: none;
        }

        #qr canvas { margin: 0 auto; border: 10px solid white; border-radius: 16px; }

        .lang-toggle {
            position: absolute; top: 20px; right: 16px;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: #fff; padding: 4px 10px; border-radius: 10px; font-size: 11px; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <button class="lang-toggle" onclick="toggleLang()">RU/EN</button>
    <div class="header">VPN <span>PORT</span></div>

    <div class="page-container">
        
        <div id="home" class="tab-content active">
            <div class="glass-card" style="text-align:center;">
                <div id="status-badge" style="color:#ef4444; font-size:12px; font-weight:700; margin-bottom:15px;" data-key="status_inactive">● Подписка не активна</div>
                
                <button class="btn-main" onclick="activateKeys()">
                    <i class="fas fa-bolt"></i> <span data-key="btn_get_key">Получить ключ PORT</span>
                </button>

                <div id="qr" style="margin: 25px 0;"></div>

                <div id="action-area" style="display:none;">
                    <button class="btn-main" style="background: #10b981;" onclick="autoConnect()">
                        <i class="fas fa-link"></i> <span data-key="btn_autoconnect">Автоподключение</span>
                    </button>
                    <button class="btn-secondary" onclick="copyKey()">
                        <i class="fas fa-copy"></i> <span data-key="btn_copy">Копировать ключ</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="plans" class="tab-content">
            <h3 data-key="title_plans">Тарифные планы</h3>
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div><b data-key="plan_3_title">3 Месяца</b><br><small data-key="plan_3_desc">Оптимальный выбор</small></div>
                    <b>499 ₽</b>
                </div>
                <button class="btn-main" onclick="tg.showAlert('Оплата будет доступна скоро')">Выбрать</button>
            </div>
        </div>

        <div id="info" class="tab-content">
            <h3 data-key="title_setup">Приложения</h3>
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
                    <i class="fab fa-apple" style="font-size:22px;"></i> <b>iOS (iPhone)</b>
                </div>
                <button class="btn-secondary" onclick="tg.openLink('https://apps.apple.com/app/v2raytun/id6476628951')">
                    <i class="fas fa-download"></i> Скачать v2RayTun
                </button>
            </div>
            <div class="glass-card">
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
                    <i class="fab fa-android" style="font-size:22px; color:#3ddc84;"></i> <b>Android</b>
                </div>
                <button class="btn-secondary" onclick="tg.openLink('https://play.google.com/store/apps/details?id=com.v2raytun.android')">
                    <i class="fas fa-download"></i> Скачать v2RayTun
                </button>
            </div>
        </div>

        <div id="profile" class="tab-content">
            <h3 data-key="title_profile">Кабинет</h3>
            <div class="glass-card">
                <p>ID: <span id="user-id">---</span></p>
                <p data-key="label_support">Поддержка: <a href="https://t.me/your_bot" style="color:var(--accent); text-decoration:none;">@port_support</a></p>
            </div>
        </div>

    </div>

    <nav class="nav-bar" id="main-nav">
        <a href="javascript:void(0)" class="nav-item active" data-index="0">
            <i class="fas fa-rocket"></i><span data-key="nav_home">PORT</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-index="1">
            <i class="fas fa-crown"></i><span data-key="nav_plans">Планы</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-index="2">
            <i class="fas fa-mobile-alt"></i><span data-key="nav_info">Инфо</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-index="3">
            <i class="fas fa-user-circle"></i><span data-key="nav_profile">Профиль</span>
        </a>
        <div class="slider" id="nav-slider"></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let currentLang = 'ru';
        const config = "vless://uuid@server:443?security=reality#VPN_PORT";
        const tabs = ['home', 'plans', 'info', 'profile'];

        const langData = {
            ru: {
                status_inactive: "● Подписка не активна", btn_get_key: "Получить ключ PORT", btn_autoconnect: "Автоподключение",
                btn_copy: "Копировать ключ", title_plans: "Тарифные планы", title_setup: "Приложения", title_profile: "Кабинет",
                nav_home: "PORT", nav_plans: "Планы", nav_info: "Инфо", nav_profile: "Профиль", label_support: "Поддержка:",
                plan_3_title: "3 Месяца", plan_3_desc: "Оптимальный выбор"
            },
            en: {
                status_inactive: "● Subscription inactive", btn_get_key: "Get PORT Key", btn_autoconnect: "Auto-connect",
                btn_copy: "Copy Key", title_plans: "Tariff Plans", title_setup: "Apps", title_profile: "Profile",
                nav_home: "PORT", nav_plans: "Plans", nav_info: "Info", nav_profile: "Profile", label_support: "Support:",
                plan_3_title: "3 Months", plan_3_desc: "Best choice"
            }
        };

        function switchTab(idx) {
            document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            
            const slider = document.getElementById('nav-slider');
            slider.style.transform = `translateX(calc(${idx * 100}% + ${idx * 6.5}px))`;
            
            tg.HapticFeedback.impactOccurred('light');
        }

        // ЛОГИКА SLIDE-TO-TAB (зажать и водить)
        const navBar = document.getElementById('main-nav');
        const handleInteraction = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const navItem = target?.closest('.nav-item');
            if (navItem) {
                const idx = parseInt(navItem.getAttribute('data-index'));
                if (!navItem.classList.contains('active')) switchTab(idx);
            }
        };

        navBar.addEventListener('touchstart', handleInteraction);
        navBar.addEventListener('touchmove', handleInteraction);
        navBar.addEventListener('mousedown', (e) => {
            const moveHandler = (me) => handleInteraction(me);
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', () => window.removeEventListener('mousemove', moveHandler), {once:true});
            handleInteraction(e);
        });

        function toggleLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerHTML = langData[currentLang][key];
            });
        }

        function activateKeys() {
            document.getElementById('qr').innerHTML = '';
            new QRCode(document.getElementById('qr'), { text: config, width: 180, height: 180 });
            document.getElementById('action-area').style.display = 'block';
            tg.HapticFeedback.notificationOccurred('success');
        }

        function copyKey() {
            tg.setClipboardText(config);
            tg.showAlert(currentLang === 'ru' ? "Ключ скопирован!" : "Key copied!");
        }

        function autoConnect() {
            tg.setClipboardText(config);
            tg.openLink(`v2raytun://import?config=${encodeURIComponent(config)}`);
        }

        window.onload = () => {
            if(tg.initDataUnsafe?.user) document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
        };
    </script>
</body>
</html>
