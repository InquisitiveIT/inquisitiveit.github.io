<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN TATAR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .price { font-size: 32px; color: #ff3b30; font-weight: bold; margin: 10px 0; }
        .btn { background: #ff3b30; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .key-box { background: #222; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 10px; border: 1px dashed #444; }
        .status { color: #4cd964; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>VPN TATAR</h1>
    
    <div class="card">
        <div id="user-status">Проверка подписки...</div>
        <div id="key-display" style="display:none;">
            <div class="status">● Подписка активна</div>
            <div class="key-box" id="vless-key">vless://...ваш_ключ...</div>
            <button class="btn" style="background:#333; margin-top:10px;" onclick="copyKey()">Скопировать ключ</button>
        </div>
    </div>

    <div class="card">
        <h3>Тариф "Месяц"</h3>
        <div class="price">199 ₽</div>
        <button class="btn" onclick="startPay()">Купить доступ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function checkSubscription() {
            try {
                // Запрос к твоему Бэкенду на Aeza
                const response = await fetch('http://77.221.154.23:3000/api/me', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initData: tg.initData })
                });
                const res = await response.json();
                
                if (res.ok && res.data && res.data.length > 0) {
                    document.getElementById('user-status').style.display = 'none';
                    document.getElementById('key-display').style.display = 'block';
                    // Тут можно будет выводить реальный ключ из базы
                } else {
                    document.getElementById('user-status').innerText = 'У вас пока нет активной подписки';
                }
            } catch (e) {
                document.getElementById('user-status').innerText = 'Ошибка связи с сервером';
            }
        }

        function copyKey() {
            const key = document.getElementById('vless-key').innerText;
            navigator.clipboard.writeText(key);
            tg.showAlert("Ключ скопирован!");
        }

        function startPay() {
            tg.showConfirm("Перейти к оплате 199 ₽?", (ok) => {
                if (ok) {
                    // Эту часть мы оживим на следующем шаге с 1Plat
                    tg.showAlert("Система оплаты подключается...");
                }
            });
        }

        checkSubscription();
    </script>
</body>
</html>
