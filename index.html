<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN TATAR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #0088cc;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Контентные секции */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
            display: none;
        }

        .content.active { display: block; }

        /* Шапка статуса */
        .status-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .status-dot {
            height: 10px; width: 10px;
            background-color: #ff4444; /* Красный если нет подписки */
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.active { background-color: #00ff88; }

        .key-box {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-family: monospace;
            word-break: break-all;
            font-size: 13px;
            color: var(--accent-color);
            cursor: pointer;
        }

        /* Тарифы */
        .plan-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .plan-info h3 { margin: 0; font-size: 18px; }
        .plan-info p { margin: 5px 0 0; color: var(--text-dim); font-size: 14px; }

        .buy-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Нижнее меню */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #333;
        }

        .nav-item {
            color: var(--text-dim);
            text-align: center;
            font-size: 12px;
            text-decoration: none;
            flex: 1;
        }

        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="home" class="content active">
        <h2 style="margin-top: 0;">VPN TATAR</h2>
        <div class="status-card">
            <div id="status-text"><span class="status-dot"></span>Подписка: Не активна</div>
            <div class="key-box" onclick="copyKey()">Нажмите, чтобы купить доступ</div>
            <p style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">Ключ появится здесь после оплаты</p>
        </div>
        <div class="status-card" style="padding: 15px;">
            <i class="fas fa-info-circle"></i> Инструкция по установке
        </div>
    </div>

    <div id="shop" class="content">
        <h2>Выберите тариф</h2>
        <div class="plan-card">
            <div class="plan-info">
                <h3>1 Месяц</h3>
                <p>199 ₽ / мес</p>
            </div>
            <button class="buy-btn" onclick="pay(199)">Купить</button>
        </div>
        <div class="plan-card">
            <div class="plan-info">
                <h3>3 Месяца</h3>
                <p>499 ₽ <span style="color: #00ff88; font-size: 12px;">-15%</span></p>
            </div>
            <button class="buy-btn" onclick="pay(499)">Купить</button>
        </div>
    </div>

    <div id="help" class="content">
        <h2>Поддержка</h2>
        <p>Если возникли вопросы, наш менеджер поможет 24/7</p>
        <button class="buy-btn" style="width: 100%;" onclick="window.location.href='https://t.me/твой_логин'">Написать в поддержку</button>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="showTab('home', this)">
            <i class="fas fa-home"></i>Главная
        </a>
        <a href="#" class="nav-item" onclick="showTab('shop', this)">
            <i class="fas fa-shopping-cart"></i>Тарифы
        </a>
        <a href="#" class="nav-item" onclick="showTab('help', this)">
            <i class="fas fa-headset"></i>Помощь
        </a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function pay(amount) {
            tg.showConfirm(`Оплатить доступ за ${amount}₽?`, async (ok) => {
                if (ok) {
                    try {
                        // ТУТ МЫ ЗАМЕНИМ НА ТВОЮ ССЫЛКУ ИЗ NGROK
                        const response = await fetch('https://твой-ngrok-адрес.ngrok-free.app/api/pay', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ amount: amount })
                        });
                        const data = await response.json();
                        if (data.url) tg.openLink(data.url);
                    } catch (e) {
                        tg.showAlert("Сервер временно недоступен. Попробуйте позже.");
                    }
                }
            });
        }

        function copyKey() {
            // Функция для будущего копирования ключа
            tg.showAlert("У вас пока нет активного ключа.");
        }
    </script>
</body>
</html>
