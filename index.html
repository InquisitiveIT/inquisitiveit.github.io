<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VPN TATAR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1c1c1e; padding: 20px; border-radius: 20px; margin-top: 50px; }
        .btn { background: #007aff; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>VPN TATAR</h2>
    <div class="card">
        <p>Подписка на 1 месяц</p>
        <p><b>199 ₽</b></p>
        <button class="btn" onclick="buy()">КУПИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function buy() {
            // Твой прямой IP. Telegram откроет его во внешнем браузере.
            const url = "http://77.221.154.23:3000/api/pay?amount=199";
            tg.openLink(url);
        }
    </script>
</body>
</html>
