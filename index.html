<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VPN Port</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --tg-bg-color: #0a0e17;
            --tg-text-color: #e0e7ff;
            --tg-hint-color: #94a3b8;
            --tg-button-color: #3b82f6;
            --tg-accent: #ef4444;
            --glass-bg: rgba(30, 41, 59, 0.65);
            --glass-border: rgba(59, 130, 246, 0.25);
            --blur: blur(24px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
            color: var(--tg-text-color);
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .page-container { flex: 1; overflow-y: auto; padding: 0 16px 100px; }
        .logo-header { text-align: center; padding: 20px 0; }
        .logo-header img { max-width: 160px; filter: drop-shadow(0 4px 12px rgba(59,130,246,0.6)); }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--tg-button-color), #2563eb);
            color: white; border: none; padding: 16px; border-radius: 16px;
            width: 100%; font-weight: 700; font-size: 16px; margin: 10px 0;
        }

        .nav-bar {
            position: fixed; bottom: 20px; left: 16px; right: 16px;
            background: var(--glass-bg); backdrop-filter: blur(40px);
            border-radius: 28px; border: 1px solid var(--glass-border);
            height: 64px; display: flex; padding: 4px;
        }

        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--tg-hint-color); font-size: 11px; text-decoration: none;
        }

        .nav-item.active { color: white; }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }
        
        .loader { display: none; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--tg-button-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #qr { margin: 20px auto; background: white; padding: 10px; border-radius: 12px; display: inline-block; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="logo-header"><img src="https://files.catbox.moe/9o4k5q.png"></div>

    <div id="home" class="tab-content active">
        <h2 style="text-align:center;">VPN Port</h2>
        <div class="glass-card" style="text-align:center;">
            <div id="sub-status" style="color: #4ade80; margin-bottom: 15px;">● Бесплатный тестовый доступ</div>
            <button class="btn-main" onclick="connectVpn()">Получить ключ</button>
            <div class="loader" id="loader"></div>
            <div id="qr-wrapper" style="display:none;">
                <div id="qr"></div>
                <button class="btn-main" onclick="autoConnect()">⚡ Автоподключение v2RayTun</button>
            </div>
        </div>
    </div>

    <div id="profile" class="tab-content">
        <h2 style="text-align:center;">Профиль</h2>
        <div class="glass-card">
            <p><strong>ID:</strong> <span id="u-id">---</span></p>
            <p><strong>Тариф:</strong> <span>Бесплатный (Друзья)</span></p>
            <p><strong>Осталось:</strong> <span>30 дней</span></p>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i><span>Главная</span></a>
    <a href="#" class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user"></i><span>Профиль</span></a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    const API_URL = "http://77.221.154.23:3000";
    let savedKey = "";

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function connectVpn() {
        document.getElementById('loader').style.display = 'block';
        try {
            const user = tg.initDataUnsafe?.user || { id: 12345 };
            const res = await fetch(`${API_URL}/api/get-key`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: user.id })
            });
            const data = await res.json();
            if(data.key) {
                savedKey = data.key;
                document.getElementById('qr').innerHTML = "";
                new QRCode(document.getElementById('qr'), { text: data.key, width: 180, height: 180 });
                document.getElementById('qr-wrapper').style.display = 'block';
            }
        } catch(e) { tg.showAlert("Ошибка сервера"); }
        document.getElementById('loader').style.display = 'none';
    }

    function autoConnect() {
        tg.setClipboardText(savedKey);
        // Специальный формат для v2RayTun
        tg.openLink(`v2raytun://import/${savedKey}`);
        tg.showAlert("Конфиг скопирован! Если приложение не открылось, вставьте его через '+' в v2RayTun.");
    }

    window.onload = () => {
        document.getElementById('u-id').innerText = tg.initDataUnsafe?.user?.id || "---";
    };
</script>
</body>
</html>
